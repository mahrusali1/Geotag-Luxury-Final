name: Build Extension

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Ant
        run: |
          ant clean
          ant extensions
          # Perintah tambahan untuk melihat di mana file .aix berada
          echo "Mencari file .aix yang dihasilkan..."
          find . -name "*.aix"

      - name: Upload AIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeotagLuxury-Extension
          # Kita suruh robot cari di seluruh root folder tanpa ampun
          path: |
            out/*.aix
            **/out/*.aix
            build/**/*.aix
            **/*.aix
          if-no-files-found: error
