name: Build Extension

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Run Update Deps
        run: |
          chmod +x update-deps.sh
          ./update-deps.sh

      - name: Build Extension with Ant
        run: ant extensions

      - name: Upload AIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kalender-Extension
          path: out/*.aix
