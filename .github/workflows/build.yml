name: Build Extension

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Ant
        run: |
          # 1. Cek folder lib dulu, ada isinya tidak?
          echo "=== CEK ISI FOLDER LIB ==="
          ls -R lib || echo "Folder lib tidak ditemukan!"
          
          # 2. Jalankan Build
          ant clean
          ant extensions -v  # Pakai -v (verbose) agar log-nya lengkap
          
          # 3. Cari file .aix secara paksa
          echo "=== HASIL PENCARIAN FILE .AIX ==="
          find . -name "*.aix"

      - name: Upload AIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeotagLuxury-Extension
          path: "**/*.aix"
          if-no-files-found: warn # Ganti ke warn dulu agar tidak langsung merah
