name: Build Extension

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Kita paksa jalankan semua target: clean, compile, lalu bungkus ke AIX
      - name: Build with Ant
        run: |
          ant clean
          ant extensions

      - name: Upload AIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeotagLuxury-Extension
          # Gunakan satu baris sapu jagat ini saja
          path: "**/*.aix"
          if-no-files-found: error
